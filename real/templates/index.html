<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RERA Progress Snapshot Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .file-upload {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.4);
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .file-upload:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .file-upload input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: var(--text-muted);
            font-weight: 400;
        }
        
        .file-upload-text span {
            color: var(--primary);
            font-weight: 600;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }
        
        /* Micro animation for file selected */
        .file-selected {
            border-color: var(--accent) !important;
            background: rgba(139, 92, 246, 0.1) !important;
        }
        
        #file-name {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>RERA Reg-4 Snapshot</h1>
                <p>Generate compliant progress reports instantly.</p>
            </div>
            
            <form action="/generate" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label for="project_name">Project Name</label>
                    <input type="text" id="project_name" name="project_name" value="G.H.I. CITY Phase 2" required>
                </div>
                
                <div class="form-group">
                    <label for="rera_id">RERA Registration ID</label>
                    <input type="text" id="rera_id" name="rera_id" value="UPRERAPRJ937180" required>
                </div>
                
                <div class="form-group">
                    <label for="builder_name">Promoter / Builder Name</label>
                    <input type="text" id="builder_name" name="builder_name" value="CZAR Buildcon Pvt. Ltd." required>
                </div>
                
                <div class="form-group">
                    <label>Drone / Site Photo</label>
                    <div class="file-upload" id="drop-zone">
                        <input type="file" id="image" name="image" accept="image/*" required>
                        <div class="file-upload-text">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 0.5rem; color: var(--primary);">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <br>
                            <span>Click to upload</span> or drag and drop<br>
                            <small style="opacity: 0.7; font-size: 0.8rem;">(JPEG, PNG)</small>
                            <span id="file-name"></span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Generate RERA Document</button>
                
            </form>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('image');
        const dropZone = document.getElementById('drop-zone');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                dropZone.classList.add('file-selected');
                fileNameDisplay.textContent = this.files[0].name;
                document.querySelector('.file-upload-text > span').textContent = 'File selected';
            } else {
                dropZone.classList.remove('file-selected');
                fileNameDisplay.textContent = '';
                document.querySelector('.file-upload-text > span').textContent = 'Click to upload';
            }
        });
    </script>
</body>
</html>
